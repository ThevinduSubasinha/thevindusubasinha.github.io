<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thevindu Subasinha | Mechatronics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --sub-text: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1a1a1a, #000000);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Blur Blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #0071e3, #5e5ce6);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
            opacity: 0.4;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* Liquid Glass Container */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s ease;
            animation: fadeIn 1.2s ease-out;
        }

        .glass-card:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--sub-text);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }

        .info {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #d1d1d6;
        }

        /* Apple-style Pill Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 980px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: #ffffff;
            color: #000;
        }

        .btn-primary:hover {
            background: #f5f5f7;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .glass-card { padding: 40px 20px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <h1>Thevindu Subasinha</h1>
        <p class="tagline">Mechatronics Engineer</p>
        <p class="info">Sustainable Design Engineering<br>University of Prince Edward Island</p>
        
        <div class="btn-group">
            <a href="https://www.linkedin.com/in/thevindu-methnuka-a86095256" class="btn btn-primary" target="_blank">Connect on LinkedIn</a>
            <a href="https://github.com/thevindusubasinha" class="btn btn-secondary" target="_blank">View GitHub</a>
        </div>
    </div>

</body>
</html>
